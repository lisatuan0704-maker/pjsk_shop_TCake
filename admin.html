<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賣家後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14;--surface:#17171f;--surface2:#1f1f2a;--border:#2a2a38;
  --accent:#7c6af7;--pink:#f06292;--green:#4caf82;--red:#e05252;
  --text:#e4e4f0;--dim:#7a7a90;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOCK */
.lock-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:320px;text-align:center}
.lock-box h1{font-size:22px;font-weight:700;margin-bottom:6px}
.lock-box p{font-size:13px;color:var(--dim);margin-bottom:24px}
.lock-box input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:13px 16px;font-size:16px;color:var(--text);font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px}
.lock-box input:focus{border-color:var(--accent)}

/* LAYOUT */
.app{display:none;max-width:700px;margin:0 auto;padding:24px 16px}
.app-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.app-header h1{font-size:20px;font-weight:700}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:transparent;border:1px solid var(--border);color:var(--red);padding:7px 12px;font-size:12px;border-radius:8px}
.btn-full{width:100%}

/* FORM */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.field{margin-bottom:13px}
label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;font-weight:500}
input,textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 15px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--dim)}
input[type=number]{-moz-appearance:textfield}

.img-pick{width:100%;height:110px;border:1.5px dashed var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;color:var(--dim);font-size:13px;gap:6px;transition:border-color .2s}
.img-pick:hover{border-color:var(--accent)}
.img-pick img{width:100%;height:100%;object-fit:cover}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:12px;cursor:pointer;transition:all .15s}
.chip:hover{background:var(--accent);border-color:var(--accent);color:#fff}

/* SECTION TITLE */
.sec{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin:24px 0 10px;display:flex;justify-content:space-between;align-items:center}

/* ENTRY ROW */
.entry-row{display:flex;align-items:center;gap:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.thumb{width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.thumb img{width:48px;height:48px;object-fit:cover}
.einfo{flex:1;min-width:0}
.ename{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ebuyer{font-size:11px;color:var(--accent);margin-top:2px}
.eprice{font-size:11px;color:var(--dim);margin-top:1px}

/* SUMMARY */
.buyer-block{border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.bhead{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface2)}
.bname{font-size:15px;font-weight:700}
.bmeta{font-size:11px;color:var(--dim);margin-top:2px}
.btotal{font-family:'Space Mono',monospace;font-size:14px;color:var(--green)}
.brow{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.brow:last-child{border-bottom:none}
.bt{width:36px;height:36px;border-radius:6px;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bt img{width:36px;height:36px;object-fit:cover}
.bn{flex:1;font-size:13px;font-weight:500}
.bd{font-size:11px;color:var(--dim);margin-top:1px}
.bp{font-family:'Space Mono',monospace;font-size:12px;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* STATUS */
.status-bar{text-align:center;padding:8px;font-size:12px;color:var(--dim);margin-bottom:8px}

@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:up .2s ease forwards}
</style>
</head>
<body>

<!-- LOCK -->
<div class="lock-wrap" id="lockWrap">
  <div class="lock-box">
    <h1>🔐 賣家後台</h1>
    <p>輸入密碼登入管理</p>
    <input type="password" id="pwInput" placeholder="密碼" onkeydown="if(event.key==='Enter')unlock()">
    <button class="btn btn-primary btn-full" onclick="unlock()">登入</button>
    <p style="margin-top:10px;font-size:11px;color:var(--dim)">預設密碼：1234</p>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="app-header">
    <h1>賣家後台</h1>
    <div id="syncStatus" style="font-size:12px;color:var(--dim)">同步中…</div>
  </div>

  <div class="sec">新增購買記錄</div>
  <div class="card">
    <div class="field">
      <label>買家名字</label>
      <input id="inBuyer" placeholder="輸入名字，或點選下方已有買家" oninput="renderChips()">
      <div class="chips" id="buyerChips"></div>
    </div>
    <div class="field">
      <label>商品名稱</label>
      <input id="inName" placeholder="例：金魚杏 閃卡 *10">
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input id="inDesc" placeholder="例：絕版、九成新">
    </div>
    <div class="field">
      <label>金額（NT$）</label>
      <input id="inPrice" type="number" placeholder="例：1200">
    </div>
    <div class="field">
      <label>商品圖片（點擊上傳 或 貼上截圖 Ctrl+V）</label>
      <div class="img-pick" id="imgPick" onclick="document.getElementById('imgFile').click()">
        <span>📷</span>
        <span>點擊上傳 或 貼上截圖</span>
      </div>
      <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="pickFile(this)">
      <button class="btn btn-red" id="clearImgBtn" onclick="clearImg()" style="display:none;margin-top:8px;width:100%">✕ 清除圖片</button>
    </div>
    <button class="btn btn-green btn-full" onclick="addEntry()">✅ 新增記錄</button>
  </div>

  <div class="sec" id="allLabel">所有記錄</div>
  <div id="entryList"></div>

  <div class="sec">按買家自動整理</div>
  <div id="summaryList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const DB_URL = 'https://my-shop-316d7-default-rtdb.asia-southeast1.firebasedatabase.app';
const PW = '1234';

let entries = [];
let imgB64 = '';

function unlock() {
  if (document.getElementById('pwInput').value === PW) {
    document.getElementById('lockWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadEntries();
  } else { alert('密碼錯誤！'); }
}

// ── FIREBASE ──
async function loadEntries() {
  setStatus('載入中…');
  try {
    const res = await fetch(`${DB_URL}/entries.json`);
    const data = await res.json();
    entries = data ? Object.entries(data).map(([id, v]) => ({ ...v, fireId: id })) : [];
    entries.sort((a, b) => b.id - a.id);
    setStatus('已同步 ✓');
    renderAll();
  } catch(e) { setStatus('載入失敗，請確認網路'); }
}

async function pushEntry(entry) {
  const res = await fetch(`${DB_URL}/entries.json`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(entry)
  });
  const data = await res.json();
  return data.name;
}

async function removeEntry(fireId) {
  await fetch(`${DB_URL}/entries/${fireId}.json`, { method: 'DELETE' });
}

function setStatus(msg) {
  document.getElementById('syncStatus').textContent = msg;
}

// ── IMG ──
function pickFile(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => setImg(e.target.result);
  r.readAsDataURL(file);
}
function setImg(src) {
  imgB64 = src;
  document.getElementById('imgPick').innerHTML = `<img src="${src}" style="pointer-events:none">`;
  document.getElementById('clearImgBtn').style.display = 'block';
}
function clearImg() {
  imgB64 = '';
  document.getElementById('imgPick').innerHTML = '<span>📷</span><span>點擊上傳 或 貼上截圖</span>';
  document.getElementById('imgFile').value = '';
  document.getElementById('clearImgBtn').style.display = 'none';
}

document.addEventListener('paste', e => {
  if (document.getElementById('app').style.display === 'none') return;
  for (const item of e.clipboardData.items) {
    if (item.type.startsWith('image/')) {
      const r = new FileReader();
      r.onload = ev => setImg(ev.target.result);
      r.readAsDataURL(item.getAsFile());
      break;
    }
  }
});

// ── CHIPS ──
function renderChips() {
  const val = document.getElementById('inBuyer').value.toLowerCase();
  const names = [...new Set(entries.map(e => e.buyer))];
  const list = val ? names.filter(n => n.toLowerCase().includes(val)) : names;
  document.getElementById('buyerChips').innerHTML = list.map(n =>
    `<div class="chip" onclick="document.getElementById('inBuyer').value='${esc(n)}';renderChips()">${esc(n)}</div>`
  ).join('');
}

// ── ADD ──
async function addEntry() {
  const buyer = document.getElementById('inBuyer').value.trim();
  const name  = document.getElementById('inName').value.trim();
  const desc  = document.getElementById('inDesc').value.trim();
  const price = document.getElementById('inPrice').value.trim();
  if (!buyer) { alert('請輸入買家名字'); return; }
  if (!name)  { alert('請輸入商品名稱'); return; }
  if (!price) { alert('請輸入金額'); return; }

  const btn = document.querySelector('.btn-green');
  btn.textContent = '上傳中…'; btn.disabled = true;

  const entry = { id: Date.now(), buyer, name, desc, price: Number(price), img: imgB64 };
  try {
    const fireId = await pushEntry(entry);
    entry.fireId = fireId;
    entries.unshift(entry);
    document.getElementById('inName').value = '';
    document.getElementById('inDesc').value = '';
    document.getElementById('inPrice').value = '';
    document.getElementById('imgPick').innerHTML = '<span>📷</span><span>點擊上傳 或 貼上截圖</span>';
    document.getElementById('imgFile').value = '';
    document.getElementById('clearImgBtn').style.display = 'none';
    imgB64 = '';
    showToast('新增成功！');
    renderAll();
  } catch(e) { alert('新增失敗，請確認網路'); }
  btn.textContent = '✅ 新增記錄'; btn.disabled = false;
}

// ── DELETE ──
async function delEntry(fireId) {
  if (!confirm('確定刪除？')) return;
  await removeEntry(fireId);
  entries = entries.filter(e => e.fireId !== fireId);
  showToast('已刪除');
  renderAll();
}

// ── RENDER ──
function renderAll() { renderChips(); renderEntries(); renderSummary(); }

function renderEntries() {
  document.getElementById('allLabel').textContent = `所有記錄（${entries.length} 筆）`;
  const el = document.getElementById('entryList');
  if (!entries.length) { el.innerHTML = '<p style="color:var(--dim);font-size:13px;margin-bottom:8px">還沒有記錄</p>'; return; }
  el.innerHTML = entries.map(e => `
    <div class="entry-row anim">
      <div class="thumb">${e.img ? `<img src="${e.img}">` : '📦'}</div>
      <div class="einfo">
        <div class="ename">${esc(e.name)}</div>
        <div class="ebuyer">👤 ${esc(e.buyer)}</div>
        <div class="eprice">NT$ ${Number(e.price).toLocaleString()}</div>
      </div>
      <button class="btn btn-red" onclick="delEntry('${e.fireId}')">刪除</button>
    </div>`).join('');
}

function renderSummary() {
  const el = document.getElementById('summaryList');
  const map = {};
  entries.forEach(e => { if (!map[e.buyer]) map[e.buyer] = []; map[e.buyer].push(e); });
  const buyers = Object.keys(map);
  if (!buyers.length) { el.innerHTML = ''; return; }
  el.innerHTML = buyers.map(buyer => {
    const items = map[buyer];
    const total = items.reduce((s, i) => s + Number(i.price), 0);
    return `<div class="buyer-block">
      <div class="bhead">
        <div><div class="bname">${esc(buyer)}</div><div class="bmeta">${items.length} 件商品</div></div>
        <div class="btotal">NT$ ${total.toLocaleString()}</div>
      </div>
      ${items.map(e => `<div class="brow">
        <div class="bt">${e.img ? `<img src="${e.img}">` : '📦'}</div>
        <div><div class="bn">${esc(e.name)}</div>${e.desc ? `<div class="bd">${esc(e.desc)}</div>` : ''}</div>
        <div class="bp">NT$ ${Number(e.price).toLocaleString()}</div>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
