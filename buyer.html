<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購買查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f14;--surface:#17171f;--surface2:#1f1f2a;--border:#2a2a38;
  --accent:#7c6af7;--pink:#f06292;--green:#4caf82;
  --text:#e4e4f0;--dim:#7a7a90;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.wrap{max-width:560px;margin:0 auto;padding:32px 16px}

.hero{text-align:center;padding:40px 0 32px}
.hero .icon{font-size:48px;margin-bottom:12px}
.hero h1{font-size:26px;font-weight:700;margin-bottom:6px}
.hero p{color:var(--dim);font-size:14px}

.search-row{display:flex;gap:10px;margin-bottom:28px}
.search-row input{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);
  border-radius:12px;padding:15px 18px;font-size:16px;color:var(--text);
  font-family:inherit;outline:none;transition:border-color .2s
}
.search-row input:focus{border-color:var(--accent)}
.search-row input::placeholder{color:var(--dim)}

.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:12px;padding:15px 22px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}

.result-item{
  display:flex;border:1px solid var(--border);border-radius:16px;
  overflow:hidden;margin-bottom:12px;background:var(--surface);
  transition:border-color .2s
}
.result-item:hover{border-color:var(--accent)}
.r-img{width:100px;height:100px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px}
.r-img img{width:100px;height:100px;object-fit:cover}
.r-info{padding:14px 16px;display:flex;flex-direction:column;justify-content:center;flex:1}
.r-name{font-size:15px;font-weight:600;margin-bottom:4px}
.r-desc{font-size:12px;color:var(--dim);margin-bottom:8px}
.r-price{font-family:'Space Mono',monospace;font-size:18px;color:var(--pink);font-weight:700}

.total-bar{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:14px;padding:18px 22px;display:flex;
  justify-content:space-between;align-items:center;margin-top:14px
}
.t-label{color:var(--dim);font-size:14px}
.t-amt{font-family:'Space Mono',monospace;font-size:22px;color:var(--green);font-weight:700}

.result-header{margin-bottom:22px}
.result-buyer{font-size:22px;font-weight:700;margin-bottom:4px}
.result-meta{font-size:13px;color:var(--dim)}

.not-found{text-align:center;padding:48px 0;color:var(--dim)}
.not-found .ico{font-size:44px;margin-bottom:12px}
.not-found p{font-size:14px;line-height:1.7}

.loading{text-align:center;padding:32px 0;color:var(--dim);font-size:14px}

@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:up .22s ease forwards}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="icon">📦</div>
    <h1>購買查詢</h1>
    <p>輸入你的名字，查看購買的商品清單</p>
  </div>

  <div class="search-row">
    <input id="buyerInput" placeholder="你的名字…" onkeydown="if(event.key==='Enter')doSearch()">
    <button class="btn btn-primary" onclick="doSearch()">查詢</button>
  </div>

  <div id="result"></div>
</div>

<script>
const DB_URL = 'https://my-shop-316d7-default-rtdb.asia-southeast1.firebasedatabase.app';

async function doSearch() {
  const name = document.getElementById('buyerInput').value.trim();
  const el = document.getElementById('result');
  if (!name) return;

  el.innerHTML = '<div class="loading">查詢中…</div>';

  try {
    const res = await fetch(`${DB_URL}/entries.json`);
    const data = await res.json();
    if (!data) { showNotFound(name, el); return; }

    const allEntries = Object.values(data);
    const key = [...new Set(allEntries.map(e => e.buyer))]
      .find(k => k === name || k.toLowerCase() === name.toLowerCase());

    if (!key) { showNotFound(name, el); return; }

    const items = allEntries.filter(e => e.buyer === key);
    const total = items.reduce((s, e) => s + Number(e.price), 0);

    let html = `<div class="result-header anim">
      <div class="result-buyer">👋 ${esc(key)}</div>
      <div class="result-meta">共 ${items.length} 件商品・總計 NT$ ${total.toLocaleString()}</div>
    </div>`;

    items.forEach((e, i) => {
      html += `<div class="result-item anim" style="animation-delay:${i * .06}s">
        <div class="r-img">${e.img ? `<img src="${e.img}">` : '🎮'}</div>
        <div class="r-info">
          <div class="r-name">${esc(e.name)}</div>
          ${e.desc ? `<div class="r-desc">${esc(e.desc)}</div>` : ''}
          <div class="r-price">NT$ ${Number(e.price).toLocaleString()}</div>
        </div>
      </div>`;
    });

    html += `<div class="total-bar anim">
      <span class="t-label">💰 總計金額</span>
      <span class="t-amt">NT$ ${total.toLocaleString()}</span>
    </div>`;

    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="not-found"><div class="ico">⚠️</div><p>網路錯誤，請稍後再試</p></div>';
  }
}

function showNotFound(name, el) {
  el.innerHTML = `<div class="not-found anim">
    <div class="ico">🔍</div>
    <p>找不到「${esc(name)}」的購買記錄<br>請確認名字是否正確，或聯繫賣家</p>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
